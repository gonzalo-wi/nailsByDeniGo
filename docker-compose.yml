services:
  api:
    build: .
    container_name: apigoshei
    restart: unless-stopped
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      - APP_PORT=8082
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/service-nails/health"]
      interval: 30s
      timeout: 5s
      retries: 3
